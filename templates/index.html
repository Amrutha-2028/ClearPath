<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="clearPathLogo.ico.jpg">
    <title>✨ Clear Path ✨</title>
    <style>
        body {
            font-family: 'Raleway', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            padding: 2rem;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: rgba(255,255,255,0.9);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0056b3;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .nav-button {
            text-decoration: none;
            background-color: #0056b3;
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 10px;
            display: inline-block;
            transition: transform 0.1s ease;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .nav-button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Clear Path ✨</h1>
        <p>Welcome to Clear Path, an assistive tool for vision and hearing support with helpful features. Choose a page below to get started.</p>
        <div class="nav-links">
            <a href="/vision.html" class="nav-button">Vision Assistant</a>
            <a href="/hearing.html" class="nav-button">Hearing Assistant</a>
        </div>
    </div>
</body>
</html>
