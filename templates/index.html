<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✨ Clear Path ✨</title>
    <link rel="preconnect" href="https://fonts.cdnfonts.com" />
    <link href="https://fonts.cdnfonts.com/css/open-dyslexic" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="clearPathLogo.ico.jpg">
    <style>
        :root {
            --bg-color: linear-gradient(135deg, #b4cce9 0%, #17508a 100%);
            --bg-overlay: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --accent-color: #4a90e2;
            --accent-hover: #357abd;
            --button-text: #ffffff;
            --panel-bg: rgba(255, 255, 255, 0.15);
            --panel-border: rgba(255, 255, 255, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --glow-color: rgba(74, 144, 226, 0.5);
        }

        .high-contrast-mode {
            --bg-color: #000;
            --text-color: #ffeb3b;
            --accent-color: #ffffff;
            --button-text: #000;
            --panel-bg: rgba(0, 0, 0, 0.85);
            --panel-border: rgba(255, 235, 59, 0.3);
            --glow-color: rgba(255, 235, 59, 0.5);
        }

        .color-blind-mode {
            --bg-color: linear-gradient(135deg, #f7f2e7 0%, #e8d5b7 100%);
            --text-color: #003049;
            --accent-color: #d62828;
            --button-text: #ffffff;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --panel-border: rgba(214, 40, 40, 0.3);
            --glow-color: rgba(214, 40, 40, 0.3);
            filter: saturate(1.1);
        }

        .dyslexic-font,
        .dyslexic-font * {
            font-family: 'Raleway', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important;
            font-weight: 600 !important;
            letter-spacing: 0.04em !important;
            word-spacing: 0.12em !important;
            text-rendering: optimizeLegibility !important;
        }

        .dyslexic-font {
            line-height: 1.8 !important;
        }

        * {
            box-sizing: border-box;
            font-family: 'Raleway', sans-serif;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            background: var(--bg-color);
            background-attachment: fixed;
            color: var(--text-color);
            font-family: 'Raleway', sans-serif;
            line-height: 1.6;
            padding: 1.5rem;
            transition: all 0.3s ease;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-overlay);
            backdrop-filter: blur(1px);
            z-index: -1;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px var(--shadow-color),
                        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-color), #4ecdc4, var(--accent-color));
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        h1,
        h2 {
            position: relative;
            padding-bottom: 15px;
            margin-bottom: 1.5rem;
            color: var(--text-color);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 2px 8px var(--shadow-color);
            filter: brightness(1.2);
        }

        h1 {
            margin-top: 0;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-align: center;
            animation: glow 2s ease-in-out infinite alternate;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-color), transparent, var(--accent-color));
            border-radius: 2px;
        }

        h2 {
            margin-top: 2.5rem;
            font-size: 1.8rem;
            font-weight: 600;
            border-bottom: none;
            padding-left: 20px;
        }

        h2::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 30px;
            background: var(--accent-color);
            border-radius: 3px;
            box-shadow: 0 0 10px var(--glow-color);
        }

        @keyframes glow {
            from { text-shadow: 0 2px 4px var(--shadow-color); }
            to { text-shadow: 0 2px 4px var(--shadow-color), 0 0 20px var(--glow-color); }
        }

        section {
            margin-bottom: 3rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        section:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-1px);
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 2rem 0;
        }

        .nav-button {
            text-decoration: none;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            color: var(--button-text);
            padding: 16px 24px;
            border-radius: 12px;
            display: inline-block;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            font-size: 1.1rem;
            min-width: 200px;
            text-align: center;
        }

        .nav-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .nav-button:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .nav-button:hover::before {
            left: 100%;
        }

        p {
            line-height: 1.7;
            margin-bottom: 1rem;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 1px 2px var(--shadow-color);
            text-align: center;
            font-size: 1.2rem;
        }

        strong {
            color: var(--accent-color);
            font-weight: 700;
        }

        /* Responsive design improvements */
        @media (max-width: 768px) {
            body {
                padding: 0.5rem;
            }

            .container {
                margin: 0.5rem;
                padding: 1rem;
                border-radius: 12px;
            }

            h1 {
                font-size: 1.8rem;
                text-align: center;
            }

            .nav-links {
                gap: 1rem;
            }

            .nav-button {
                min-width: 150px;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Clear Path ✨</h1>
        <p>Welcome to <strong>Clear Path</strong>, an assistive tool for vision and hearing support with AI-powered features. Choose a page below to get started.</p>
        <div class="nav-links">
            <a href="/vision.html" class="nav-button">Vision Assistant</a>
            <a href="/hearing.html" class="nav-button">Hearing Assistant</a>
        </div>
    </div>
</body>
</html>
